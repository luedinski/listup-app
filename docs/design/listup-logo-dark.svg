<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <linearGradient id="iconGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2EC4B6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="upGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2EC4B6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="300" height="100" fill="#0F1923"/>

  <!-- Icon -->
  <rect x="8" y="10" width="80" height="80" rx="20" ry="20" fill="url(#iconGradDark)" />

  <!-- Line 1: checked -->
  <circle cx="30" cy="36" r="7" fill="none" stroke="white" stroke-width="2.5"/>
  <polyline points="26,36 29,40 35,32" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="44" y="33" width="28" height="5" rx="2.5" fill="white" opacity="0.9"/>

  <!-- Line 2: checked -->
  <circle cx="30" cy="55" r="7" fill="none" stroke="white" stroke-width="2.5"/>
  <polyline points="26,55 29,59 35,51" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="44" y="52" width="22" height="5" rx="2.5" fill="white" opacity="0.9"/>

  <!-- Line 3: up arrow -->
  <circle cx="30" cy="74" r="7" fill="none" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <polyline points="27,75 30,71 33,75" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <line x1="30" y1="71" x2="30" y2="77" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <rect x="44" y="71" width="18" height="5" rx="2.5" fill="white" opacity="0.4"/>

  <!-- Wordmark: "List" white bold, "up" gradient directly after -->
  <text
    x="106"
    y="68"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="44"
    letter-spacing="-1"
  >
    <tspan font-weight="700" fill="white">List</tspan><tspan font-weight="400" fill="url(#upGradDark)">up</tspan>
  </text>
</svg>
